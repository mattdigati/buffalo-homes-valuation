<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buffalo Homes — Property Valuation</title>
  <meta name="description" content="Free home valuation tool powered by U.S. Census data. Get an instant property estimate for any address.">
  <meta property="og:title" content="Buffalo Homes — Property Valuation">
  <meta property="og:description" content="Free home valuation powered by Census ACS data.">
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: #F9FAFB; color: #374151; line-height: 1.5; }
    input, button, select { font-family: inherit; }

    /* ── Brand Tokens ── */
    :root {
      --navy: #0F2439; --blue: #1A3A5C; --sky: #3B82F6; --light-sky: #DBEAFE;
      --gold: #D4A843; --light-gold: #FDF6E3; --green: #16A34A; --red: #DC2626;
      --g50: #F9FAFB; --g100: #F3F4F6; --g200: #E5E7EB; --g300: #D1D5DB;
      --g400: #9CA3AF; --g500: #6B7280; --g700: #374151; --g900: #111827; --white: #fff;
    }

    /* ── Layout ── */
    .header { background: var(--navy); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-brand span.b { color: var(--white); font-size: 18px; font-weight: 700; letter-spacing: .5px; }
    .header-brand span.h { color: var(--gold); font-size: 18px; font-weight: 400; margin-left: 4px; }
    .header-tag { color: var(--g400); font-size: 11px; letter-spacing: 2px; }
    .gold-bar { height: 3px; background: linear-gradient(90deg, var(--gold), #D4A84388, var(--gold)); }
    .container { max-width: 640px; margin: 0 auto; padding: 24px 16px 64px; }

    /* ── Card ── */
    .card { background: var(--white); border-radius: 12px; border: 1px solid var(--g200); padding: 24px; margin-bottom: 20px; }

    /* ── Form ── */
    .section-title { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 16px; }
    .sub-title { font-size: 13px; font-weight: 600; color: var(--g500); margin-bottom: 12px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--g700); margin-bottom: 4px; letter-spacing: .3px; }
    .field input, .field select {
      width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid var(--g300);
      border-radius: 6px; outline: none; color: var(--g900); background: var(--white); transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus, .field select:focus { border-color: var(--sky); box-shadow: 0 0 0 2px var(--light-sky); }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    .row { display: grid; gap: 10px; }
    .row-3 { grid-template-columns: 1fr 1fr 1fr; }
    .row-city { grid-template-columns: 1fr 80px 100px; }

    .divider { height: 1px; background: var(--g200); margin: 18px 0; }

    /* ── Condition Buttons ── */
    .cond-row { display: flex; gap: 6px; margin-bottom: 20px; }
    .cond-btn {
      flex: 1; padding: 8px 4px; font-size: 11px; font-weight: 600; text-transform: capitalize;
      border: 1.5px solid var(--g300); border-radius: 6px; cursor: pointer; background: var(--white); color: var(--g500); transition: all .15s;
    }
    .cond-btn.active { border-color: var(--sky); background: var(--light-sky); color: var(--sky); }

    /* ── Primary Button ── */
    .btn-primary {
      width: 100%; padding: 14px; font-size: 15px; font-weight: 700; color: var(--white);
      background: linear-gradient(135deg, var(--navy), var(--blue)); border: none; border-radius: 8px;
      cursor: pointer; letter-spacing: .5px; transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .92; }
    .btn-primary:disabled { opacity: .55; cursor: wait; }

    .error-msg { padding: 8px 12px; background: #FEF2F2; color: var(--red); font-size: 13px; border-radius: 6px; margin-bottom: 12px; }

    /* ── Results ── */
    .results-card { background: var(--white); border-radius: 12px; border: 1px solid var(--g200); overflow: hidden; }
    .results-header { background: var(--navy); padding: 16px 24px; color: var(--white); }
    .results-header .tag { font-size: 11px; color: var(--g400); letter-spacing: 2px; margin-bottom: 4px; }
    .results-header .addr { font-size: 16px; font-weight: 600; }
    .results-body { padding: 24px; }

    .census-badge {
      display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 600; margin-bottom: 12px;
    }
    .census-badge.zip { background: #DCFCE7; color: var(--green); }
    .census-badge.state { background: #FEF3C7; color: #92400E; }

    .hero-value { text-align: center; margin: 8px 0; }
    .hero-value .label { font-size: 11px; color: var(--sky); letter-spacing: 2px; font-weight: 600; margin-bottom: 4px; }
    .hero-value .amount { font-size: 40px; font-weight: 800; color: var(--navy); letter-spacing: -1px; }
    .hero-value .range { font-size: 14px; color: var(--g500); }
    .hero-value .conf { font-size: 11px; color: var(--g400); }

    /* ── Range Gauge ── */
    .gauge { position: relative; height: 80px; margin: 16px 0 8px; }
    .gauge-track { position: absolute; top: 32px; left: 0; right: 0; height: 14px; background: var(--g200); border-radius: 7px; }
    .gauge-fill { position: absolute; top: 32px; height: 14px; background: linear-gradient(90deg, #3B82F6, #60A5FA, #3B82F6); border-radius: 7px; }
    .gauge-marker { position: absolute; top: 18px; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
    .gauge-marker .line { width: 3px; height: 40px; background: var(--navy); border-radius: 2px; }
    .gauge-marker .diamond { width: 12px; height: 12px; background: var(--gold); border: 2px solid var(--navy); transform: rotate(45deg); margin-top: -8px; }
    .gauge-label { position: absolute; transform: translateX(-50%); text-align: center; }
    .gauge-label .val { font-size: 11px; font-weight: 600; color: var(--g500); }
    .gauge-label .txt { font-size: 9px; color: var(--g400); letter-spacing: 1px; }
    .gauge-label-top .txt { font-size: 9px; color: var(--g400); letter-spacing: 1px; }
    .gauge-label-top .val { font-size: 13px; font-weight: 700; color: var(--navy); }

    /* ── Stat Cards ── */
    .stats-row { display: flex; gap: 8px; margin: 20px 0; }
    .stat-card {
      flex: 1; min-width: 0; position: relative; overflow: hidden; border-radius: 8px;
      border: 1px solid var(--g200); background: var(--g50); padding: 14px 6px 10px; text-align: center;
    }
    .stat-card .accent { position: absolute; top: 0; left: 8px; right: 8px; height: 3px; border-radius: 0 0 2px 2px; }
    .stat-card .val { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stat-card .lbl { font-size: 9px; color: var(--g500); letter-spacing: .5px; text-transform: uppercase; }

    /* ── Tables ── */
    .table { border-radius: 8px; border: 1px solid var(--g200); overflow: hidden; margin-bottom: 16px; }
    .table-header { display: grid; padding: 8px 14px; background: var(--navy); color: var(--white); font-size: 11px; font-weight: 700; letter-spacing: .5px; }
    .table-row { display: grid; padding: 8px 14px; font-size: 13px; border-bottom: 1px solid var(--g200); }
    .table-row:last-child { border-bottom: none; }
    .table-row.even { background: var(--g50); }
    .table-row.total { background: var(--light-gold); border-top: 2px solid var(--gold); font-weight: 700; }
    .table-row .factor { color: var(--g700); }
    .table-row .adj { text-align: right; font-weight: 600; }
    .adj.pos { color: var(--green); }
    .adj.neg { color: var(--red); }
    .cols-2 { grid-template-columns: 1fr auto; }

    .data-source { padding: 12px 14px; background: var(--g50); border-radius: 8px; border: 1px solid var(--g200); margin-top: 16px; }
    .data-source .title { font-size: 11px; font-weight: 700; color: var(--g500); letter-spacing: .5px; margin-bottom: 4px; }
    .data-source .text { font-size: 12px; color: var(--g500); line-height: 1.5; }
    .disclaimer { text-align: center; font-size: 11px; color: var(--g400); margin-top: 16px; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .row-city { grid-template-columns: 1fr; }
      .row-3 { grid-template-columns: 1fr 1fr; }
      .stats-row { flex-wrap: wrap; }
      .stat-card { min-width: calc(50% - 4px); }
      .hero-value .amount { font-size: 32px; }
      .header { padding: 12px 16px; }
      .header-tag { display: none; }
      .container { padding: 16px 12px 48px; }
    }
  </style>
</head>

      </div>

      <div class="divider"></div>
      <div class="sub-title">Property Details</div>

      <div class="row row-3">
        <div class="field"><label for="sqft">Living Sq Ft *</label><input type="number" id="sqft" placeholder="1850"></div>
        <div class="field"><label for="bedrooms">Bedrooms</label><input type="number" id="bedrooms" value="3"></div>
        <div class="field"><label for="bathrooms">Bathrooms</label><input type="number" id="bathrooms" value="2" step="0.5"></div>
      </div>

      <div class="row row-3">
        <div class="field"><label for="year_built">Year Built</label><input type="number" id="year_built" placeholder="1928"></div>
        <div class="field"><label for="lot_sqft">Lot Sq Ft</label><input type="number" id="lot_sqft" value="6000"></div>

      <div class="field"><label>Condition</label></div>
      <div class="cond-row" id="cond-row">
        <button class="cond-btn" data-val="poor">Poor</button>
        <button class="cond-btn" data-val="fair">Fair</button>
        <button class="cond-btn active" data-val="average">Average</button>
        <button class="cond-btn" data-val="good">Good</button>
        <button class="cond-btn" data-val="excellent">Excellent</button>
      </div>

      <div id="error-box" class="error-msg" style="display:none"></div>
      <button class="btn-primary" id="run-btn" onclick="runValuation()">Run Valuation</button>
    </div>

    <!-- Results (hidden until valuation runs) -->
    <div class="results-card" id="results" style="display:none">
      <div class="results-header">
        <div class="tag">VALUATION RESULTS</div>
        <div class="addr" id="r-address"></div>
      </div>
      <div class="results-body">
        <div id="r-badge"></div>
        <div class="hero-value">
          <div class="label">ESTIMATED MARKET VALUE</div>
          <div class="amount" id="r-estimate"></div>
          <div class="range" id="r-range"></div>
          <div class="conf">±12% confidence range</div>
        </div>
        <div class="gauge" id="gauge"></div>
        <div class="stats-row" id="stats-row"></div>
        <div class="section-title" style="font-size:13px;margin-bottom:8px">Valuation Adjustments</div>
        <div class="table" id="adj-table"></div>
        <div class="data-source" id="data-source"></div>
        <div class="disclaimer">This estimate is not a substitute for a professional appraisal.</div>
      </div>
    </div>
  </div>

const SN = {AL:"Alabama",AK:"Alaska",AZ:"Arizona",AR:"Arkansas",CA:"California",CO:"Colorado",CT:"Connecticut",DE:"Delaware",FL:"Florida",GA:"Georgia",HI:"Hawaii",ID:"Idaho",IL:"Illinois",IN:"Indiana",IA:"Iowa",KS:"Kansas",KY:"Kentucky",LA:"Louisiana",ME:"Maine",MD:"Maryland",MA:"Massachusetts",MI:"Michigan",MN:"Minnesota",MS:"Mississippi",MO:"Missouri",MT:"Montana",NE:"Nebraska",NV:"Nevada",NH:"New Hampshire",NJ:"New Jersey",NM:"New Mexico",NY:"New York",NC:"North Carolina",ND:"North Dakota",OH:"Ohio",OK:"Oklahoma",OR:"Oregon",PA:"Pennsylvania",RI:"Rhode Island",SC:"South Carolina",SD:"South Dakota",TN:"Tennessee",TX:"Texas",UT:"Utah",VT:"Vermont",VA:"Virginia",WA:"Washington",WV:"West Virginia",WI:"Wisconsin",WY:"Wyoming",DC:"District of Columbia"};

// ── Helpers ──
const $ = id => document.getElementById(id);
const fmt = v => v >= 0 ? '$' + v.toLocaleString() : '-$' + Math.abs(v).toLocaleString();
const fmtn = v => v.toLocaleString();
const stateFromZip = z => Z2S[z.slice(0,3)] || '';

let selectedCondition = 'average';

// ── Condition buttons ──
document.querySelectorAll('.cond-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cond-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCondition = btn.dataset.val;
  });
});

// ── State field auto-uppercase ──
$('state').addEventListener('input', function() { this.value = this.value.toUpperCase(); });
$('zip').addEventListener('input', function() { this.value = this.value.replace(/\D/g, ''); });

// ============================================================================
// CENSUS API
// ============================================================================

async function fetchCensusMedian(zip) {
  try {
    const url = `https://api.census.gov/data/2022/acs/acs5?get=B25077_001E,NAME&for=zip%20code%20tabulation%20area:${zip}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Census API error');
    const data = await res.json();
    if (data.length > 1) {
      const val = parseInt(data[1][0]);
      const name = data[1][1];
      if (!isNaN(val) && val > 0) return { median: val, name, source: 'census_zip' };
    }
  } catch(e) { /* fall through */ }
  const st = stateFromZip(zip);
  return { median: ST_MED[st] || 281900, name: (SN[st] || 'National') + ' (state average)', source: 'state_fallback' };
}

// ============================================================================
// VALUATION
// ============================================================================

function computeValuation(median) {
  const sqft = parseInt($('sqft').value) || BASELINE.sqft;
  const beds = parseInt($('bedrooms').value) || BASELINE.bedrooms;
  const baths = parseFloat($('bathrooms').value) || BASELINE.bathrooms;
  const yb = parseInt($('year_built').value) || BASELINE.year_built;
  const lot = parseInt($('lot_sqft').value) || BASELINE.lot_sqft;
  const gar = parseInt($('garage').value) || BASELINE.garage;
  const cm = COND[selectedCondition] || 1.0;

  const adjs = {
    'Square Footage': (sqft - BASELINE.sqft) * ADJ.sqft * median,
    'Bedrooms': (beds - BASELINE.bedrooms) * ADJ.bedroom * median,
    'Bathrooms': (baths - BASELINE.bathrooms) * ADJ.bathroom * median,
    'Age / Year Built': (yb - BASELINE.year_built) * ADJ.year_built * median,
    'Lot Size': (lot - BASELINE.lot_sqft) * ADJ.lot_sqft * median,
    'Garage': (gar - BASELINE.garage) * ADJ.garage * median,
  };
  const totalAdj = Object.values(adjs).reduce((a,b) => a+b, 0);
  adjs['Condition'] = (cm - 1.0) * (median + totalAdj);

  const raw = (median + totalAdj) * cm;
  const est = Math.round(raw / 1000) * 1000;
  const low = Math.round(est * 0.88 / 1000) * 1000;
  const high = Math.round(est * 1.12 / 1000) * 1000;

  return { estimate: est, low, high, pricePerSqft: sqft ? Math.round(est / sqft) : 0, areaMedian: median, adjustments: adjs, conditionMultiplier: cm, sqft, bedrooms: beds, bathrooms: baths };
}

// ============================================================================
// RENDER RESULTS
// ============================================================================

function renderGauge(low, est, high) {
  const span = high - low;
  const vL = low - span * .15, vH = high + span * .15;
  const pct = v => ((v - vL) / (vH - vL)) * 100;

  return `
    <div class="gauge-track"></div>
    <div class="gauge-fill" style="left:${pct(low)}%;width:${pct(high)-pct(low)}%"></div>
    <div class="gauge-marker" style="left:${pct(est)}%">
      <div class="line"></div><div class="diamond"></div>
    </div>
    <div class="gauge-label" style="top:54px;left:${pct(low)}%">
      <div class="val">${fmt(low)}</div><div class="txt">LOW</div>
    </div>
    <div class="gauge-label" style="top:54px;left:${pct(high)}%">
      <div class="val">${fmt(high)}</div><div class="txt">HIGH</div>
    </div>
    <div class="gauge-label gauge-label-top" style="top:0;left:${pct(est)}%">
      <div class="txt">ESTIMATE</div><div class="val">${fmt(est)}</div>
    </div>
  `;
}

function renderResults(v, census) {
  const zip = $('zip').value;
  const addr = $('address').value;
  const city = $('city').value;
  const state = $('state').value;

  // Address line
  let addrLine = '';
  if (addr) addrLine += addr + ', ';
  if (city) addrLine += city;
  if (city && state) addrLine += ', ';
  addrLine += state + ' ' + zip;
  $('r-address').textContent = addrLine;

  // Census badge
  const isZip = census.source === 'census_zip';
  $('r-badge').innerHTML = `<span class="census-badge ${isZip ? 'zip' : 'state'}">${isZip ? '●' : '◐'} ${isZip ? 'ZIP-Level Census Data: ' : 'State Fallback: '}${census.name}</span>`;

  // Big numbers
  $('r-estimate').textContent = fmt(v.estimate);
  $('r-range').textContent = fmt(v.low) + ' — ' + fmt(v.high);

  // Gauge
  $('gauge').innerHTML = renderGauge(v.low, v.estimate, v.high);

  // Stat cards
  $('stats-row').innerHTML = [
    { val: fmt(v.pricePerSqft), lbl: 'Price / Sq Ft', clr: 'var(--sky)' },
    { val: fmt(v.areaMedian), lbl: 'Area Median', clr: 'var(--gold)' },
    { val: fmtn(v.sqft), lbl: 'Living Sq Ft', clr: 'var(--green)' },
    { val: v.bedrooms + 'bd / ' + v.bathrooms + 'ba', lbl: 'Bed / Bath', clr: 'var(--sky)' },
  ].map(s => `
    <div class="stat-card">
      <div class="accent" style="background:${s.clr}"></div>
      <div class="val">${s.val}</div>
      <div class="lbl">${s.lbl}</div>
    </div>
  `).join('');

  // Adjustments table
  const entries = Object.entries(v.adjustments);
  const total = entries.reduce((s, [,v]) => s + v, 0);
  let rows = `<div class="table-header cols-2"><span>FACTOR</span><span style="text-align:right">ADJUSTMENT</span></div>`;
  entries.forEach(([k, val], i) => {
    const cls = val >= 0 ? 'pos' : 'neg';
    const sign = val >= 0 ? '+' : '';
    rows += `<div class="table-row cols-2 ${i%2?'even':''}"><span class="factor">${k}</span><span class="adj ${cls}">${sign}${fmt(Math.round(val))}</span></div>`;
  });
  const tCls = total >= 0 ? 'pos' : 'neg';
  const tSign = total >= 0 ? '+' : '';
  rows += `<div class="table-row cols-2 total"><span style="color:var(--navy)">Net Adjustment</span><span class="adj ${tCls}">${tSign}${fmt(Math.round(total))}</span></div>`;
  $('adj-table').innerHTML = rows;

  // Data source
  $('data-source').innerHTML = `
    <div class="title">DATA SOURCE</div>
    <div class="text">${isZip
      ? `U.S. Census Bureau ACS 5-Year Estimates (2022), Table B25077 — ZIP-level median home value for ZCTA ${zip}. This is real Census data for this specific ZIP code.`
      : `State-level median from ACS data. ZIP-level data was unavailable for ZCTA ${zip}. Register a free Census API key at api.census.gov for better coverage.`
    }</div>`;

  $('results').style.display = 'block';
  setTimeout(() => $('results').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

// ============================================================================
// MAIN
// ============================================================================

async function runValuation() {
  const zip = $('zip').value.trim();
  const sqft = $('sqft').value.trim();

  // Validation
  if (!zip || zip.length !== 5) {
    $('error-box').textContent = 'Please enter a valid 5-digit ZIP code.';
    $('error-box').style.display = 'block';
    return;
  }
  if (!sqft || parseInt(sqft) < 100) {
    $('error-box').textContent = 'Please enter the living area in square feet.';
    $('error-box').style.display = 'block';
    return;
  }
  $('error-box').style.display = 'none';

  // Loading state
  const btn = $('run-btn');
  btn.disabled = true;
  btn.textContent = 'Fetching Census data...';

  try {
    const census = await fetchCensusMedian(zip);
    const val = computeValuation(census.median);
    renderResults(val, census);
  } catch(e) {
    $('error-box').textContent = 'Something went wrong. Please try again.';
    $('error-box').style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'Run Valuation';
}

// Allow Enter key to submit
document.querySelectorAll('#form-card input').forEach(input => {
  input.addEventListener('keydown', e => { if (e.key === 'Enter') runValuation(); });
});
</script>
